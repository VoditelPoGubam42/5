<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калорийка — Подбор меню</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .header-font { font-family: 'Space Grotesk', sans-serif; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .option-card { transition: all 0.3s ease; }
        .option-card.active { border-color: #22c55e; background-color: #052e16; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-utensils text-white"></i>
                </div>
                <h1 class="header-font text-3xl font-semibold">Калорийка</h1>
            </div>
            <div class="text-emerald-400 text-sm font-medium">Spoonacular</div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8">

        <div class="bg-amber-500/10 border border-amber-500 text-amber-400 p-4 rounded-3xl mb-6 text-sm">
            ⚠️ В режиме песочницы рацион сохраняется только до перезагрузки страницы.
        </div>

        <!-- Экран опроса -->
        <div id="screen-survey" class="screen active">
            <h2 class="text-3xl header-font font-semibold mb-2">Подберём меню под вас</h2>
            <p class="text-zinc-400 mb-8">Ответьте на несколько вопросов</p>

            <div class="space-y-10">
                <div>
                    <p class="font-medium mb-4">1. Дневная норма калорий</p>
                    <div class="grid grid-cols-3 gap-3" id="calorie-options">
                        <button onclick="selectOption(this)" data-value="1500" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">1500 ккал</button>
                        <button onclick="selectOption(this)" data-value="1800" class="option-card border border-emerald-500 bg-emerald-950 rounded-3xl py-5 text-center active">1800 ккал</button>
                        <button onclick="selectOption(this)" data-value="2200" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">2200+ ккал</button>
                    </div>
                </div>

                <div>
                    <p class="font-medium mb-4">2. Тип питания</p>
                    <div class="grid grid-cols-2 gap-3" id="diet-options">
                        <button onclick="selectOption(this)" data-value="balanced" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Сбалансированное</button>
                        <button onclick="selectOption(this)" data-value="lowcarb" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Низкоуглеводное</button>
                        <button onclick="selectOption(this)" data-value="vegetarian" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Вегетарианское</button>
                        <button onclick="selectOption(this)" data-value="highprotein" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Высокобелковое</button>
                    </div>
                </div>

                <div>
                    <p class="font-medium mb-4">3. Предпочитаемая кухня</p>
                    <div class="grid grid-cols-2 gap-3" id="cuisine-options">
                        <button onclick="selectOption(this)" data-value="" class="option-card border border-emerald-500 bg-emerald-950 rounded-3xl py-5 text-center active">Любая</button>
                        <button onclick="selectOption(this)" data-value="Italian" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Итальянская</button>
                        <button onclick="selectOption(this)" data-value="Asian" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Азиатская</button>
                        <button onclick="selectOption(this)" data-value="Russian" class="option-card border border-zinc-700 rounded-3xl py-5 text-center">Русская</button>
                    </div>
                </div>

                <div>
                    <p class="font-medium mb-3">4. Продукты, которые нельзя есть</p>
                    <input id="exclude-input" type="text" placeholder="орехи, морепродукты, молоко..." 
                           class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 outline-none">
                </div>
            </div>

            <button onclick="generateMeals()" class="mt-12 w-full bg-emerald-500 hover:bg-emerald-600 py-6 rounded-3xl text-lg font-medium">
                Подобрать меню →
            </button>
        </div>

        <!-- Результаты меню -->
        <div id="screen-results" class="screen">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl header-font font-semibold">Ваше меню</h2>
                <button onclick="navigateTo('survey')" class="text-emerald-400 flex items-center gap-2">
                    <i class="fa-solid fa-rotate"></i> Заново
                </button>
            </div>
            <div id="meals-container" class="space-y-6"></div>
        </div>

        <!-- Мой рацион -->
        <div id="screen-ration" class="screen">
            <h2 class="text-3xl header-font font-semibold mb-6">Мой рацион</h2>
            <div id="ration-list" class="space-y-4"></div>
            <div class="mt-8 bg-zinc-900 rounded-3xl p-6">
                <div class="flex justify-between text-xl font-medium">
                    <span>Итого за день</span>
                    <span id="ration-total" class="text-emerald-400">0 ккал</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Нижняя навигация -->
    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 z-50">
        <div class="grid grid-cols-3 py-3 text-xs text-center">
            <button onclick="navigateTo('survey')" class="flex flex-col items-center text-emerald-400">📋<span>Опрос</span></button>
            <button onclick="navigateTo('results')" class="flex flex-col items-center">🍽️<span>Меню</span></button>
            <button onclick="navigateTo('ration')" class="flex flex-col items-center">📦<span>Рацион</span></button>
        </div>
    </nav>

    <!-- Детальное модальное окно рецепта -->
    <div id="recipe-modal" class="hidden fixed inset-0 bg-black/80 flex items-end md:items-center justify-center z-[100]">
        <div class="bg-zinc-900 w-full max-w-2xl rounded-t-3xl md:rounded-3xl overflow-hidden max-h-[90vh] overflow-y-auto">
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const API_KEY = "f5ef35f77e6b477a940e71fbaefe94ed";
        let todayRation = [];
        let currentRecipe = null;

        function selectOption(btn) {
            const parent = btn.parentElement;
            Array.from(parent.children).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generateMeals() {
            const calorieBtn = document.querySelector('#calorie-options .active');
            const dietBtn = document.querySelector('#diet-options .active');
            const cuisineBtn = document.querySelector('#cuisine-options .active');

            const targetCalories = calorieBtn ? parseInt(calorieBtn.dataset.value) : 1800;
            const diet = dietBtn ? dietBtn.dataset.value : 'balanced';
            const cuisine = cuisineBtn && cuisineBtn.dataset.value ? cuisineBtn.dataset.value : '';
            const exclude = document.getElementById('exclude-input').value.trim();

            document.getElementById('screen-survey').classList.remove('active');
            document.getElementById('screen-results').classList.add('active');

            const container = document.getElementById('meals-container');
            container.innerHTML = `<div class="text-center py-16 text-zinc-400">Генерируем меню...</div>`;

            try {
                let url = `https://api.spoonacular.com/mealplanner/generate?apiKey=${API_KEY}&timeFrame=day&targetCalories=${targetCalories}&diet=${diet}`;
                if (cuisine) url += `&cuisine=${cuisine}`;
                if (exclude) url += `&exclude=${encodeURIComponent(exclude)}`;

                const res = await fetch(url);
                const data = await res.json();

                let html = '';
                if (data.meals && data.meals.length) {
                    data.meals.forEach(meal => {
                        html += `
                            <div onclick="showRecipeDetail(${meal.id})" class="bg-zinc-900 rounded-3xl overflow-hidden cursor-pointer">
                                <img src="https://spoonacular.com/recipeImages/${meal.id}-556x370.jpg" 
                                     class="w-full h-52 object-cover" onerror="this.src='https://picsum.photos/800/400?random'">
                                <div class="p-5">
                                    <div class="font-semibold">${meal.title}</div>
                                    <div class="text-xs text-emerald-400 mt-1">${meal.readyInMinutes} мин • ~${Math.round(meal.servings * 350)} ккал</div>
                                </div>
                            </div>`;
                    });
                } else {
                    html = `<div class="text-center py-12 text-zinc-400">Ничего не найдено</div>`;
                }
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="text-center py-12 text-red-400">Ошибка подключения</div>`;
            }
        }

        async function showRecipeDetail(id) {
            try {
                const res = await fetch(`https://api.spoonacular.com/recipes/${id}/information?apiKey=${API_KEY}`);
                const recipe = await res.json();
                currentRecipe = recipe;

                let ingredientsHTML = recipe.extendedIngredients.map(ing => 
                    `<div class="flex justify-between py-2 border-b border-zinc-700">${ing.original}</div>`
                ).join('');

                document.getElementById('modal-content').innerHTML = `
                    <img src="${recipe.image}" class="w-full h-64 object-cover">
                    <div class="p-6">
                        <h3 class="text-2xl font-semibold mb-2">${recipe.title}</h3>
                        <div class="flex gap-4 text-sm text-emerald-400">
                            <div>${recipe.readyInMinutes} мин</div>
                            <div>${recipe.servings} порций</div>
                        </div>

                        <div class="mt-8">
                            <h4 class="font-medium mb-3">Ингредиенты</h4>
                            ${ingredientsHTML}
                        </div>

                        <div class="mt-8">
                            <h4 class="font-medium mb-3">Приготовление</h4>
                            <div class="text-zinc-300 leading-relaxed text-sm">${recipe.instructions || 'Инструкция не указана'}</div>
                        </div>

                        <div class="mt-10 flex gap-3">
                            <button onclick="addRecipeToRation()" class="flex-1 bg-emerald-500 py-5 rounded-3xl font-medium">Добавить в рацион</button>
                            <button onclick="closeRecipeModal()" class="flex-1 border border-zinc-600 py-5 rounded-3xl">Закрыть</button>
                        </div>
                    </div>
                `;

                const modal = document.getElementById('recipe-modal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } catch (e) {
                alert('Не удалось загрузить рецепт');
            }
        }

        function closeRecipeModal() {
            const modal = document.getElementById('recipe-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function addRecipeToRation() {
            if (!currentRecipe) return;

            const entry = {
                id: Date.now(),
                title: currentRecipe.title,
                image: currentRecipe.image,
                kcal: Math.round(currentRecipe.pricePerServing / 10) || 450,
                readyInMinutes: currentRecipe.readyInMinutes
            };

            todayRation.push(entry);
            closeRecipeModal();
            navigateTo('ration');
            renderRation();
        }

        function renderRation() {
            const container = document.getElementById('ration-list');
            container.innerHTML = '';
            let total = 0;

            todayRation.forEach((item, i) => {
                total += item.kcal || 450;
                const div = document.createElement('div');
                div.className = "bg-zinc-900 rounded-3xl p-4 flex gap-4 items-center";
                div.innerHTML = `
                    <img src="${item.image}" class="w-16 h-16 object-cover rounded-2xl">
                    <div class="flex-1">
                        <div class="font-medium text-sm">${item.title}</div>
                        <div class="text-emerald-400 text-xs">${item.kcal || 450} ккал • ${item.readyInMinutes} мин</div>
                    </div>
                    <button onclick="removeFromRation(${i}); event.stopImmediatePropagation()" class="text-red-400 text-3xl">×</button>
                `;
                container.appendChild(div);
            });

            document.getElementById('ration-total').textContent = total + ' ккал';
        }

        function removeFromRation(index) {
            todayRation.splice(index, 1);
            renderRation();
        }

        function navigateTo(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screen).classList.add('active');
            if (screen === 'ration') renderRation();
        }

        window.onload = () => {
            // Дефолтные активные кнопки
            document.querySelector('#calorie-options button[data-value="1800"]').classList.add('active');
            document.querySelector('#cuisine-options button[data-value=""]').classList.add('active');
            navigateTo('survey');
        };
    </script>
</body>
</html>
